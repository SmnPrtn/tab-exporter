<!DOCTYPE html>
<html>
<head>
  <title>Tab Exporter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 320px;
      padding: 15px;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    button {
      padding: 8px 12px;
      background-color: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    
    button:hover {
      background-color: #3367d6;
    }
    
    #status {
      color: #0f9d58;
      font-weight: bold;
      margin-top: 10px;
    }
    
    .error {
      color: #db4437;
    }
    
    .tab-list {
      max-height: 300px;
      overflow-y: auto;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 5px;
    }
    
    .tab-item {
      display: flex;
      align-items: center;
      padding: 5px;
      border-bottom: 1px solid #eee;
    }
    
    .tab-item:last-child {
      border-bottom: none;
    }
    
    .tab-item input[type="checkbox"] {
      margin-right: 10px;
    }
    
    .tab-item img {
      width: 16px;
      height: 16px;
      margin-right: 8px;
    }
    
    .tab-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 240px;
    }
    
    .actions {
      display: flex;
      gap: 8px;
    }
    
    #saveForm {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }
    
    #setName {
      flex-grow: 1;
      padding: 6px;
    }
    
    .saved-sets {
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Tab Exporter</h2>
    
    <div>
      <button id="selectAll">Alle auswählen</button>
      <button id="deselectAll">Alle abwählen</button>
    </div>
    
    <div class="tab-list" id="tabList">
      <!-- Tabs werden hier dynamisch eingefügt -->
    </div>
    
    <div class="actions">
      <button id="generate">Link generieren</button>
      <button id="openSaveForm">Als Set speichern</button>
    </div>
    
    <div id="saveForm" style="display: none;">
      <input type="text" id="setName" placeholder="Name des Tab-Sets">
      <button id="saveSet">Speichern</button>
    </div>
    
    <p id="status"></p>
    
    <div class="saved-sets">
      <h3>Gespeicherte Tab-Sets</h3>
      <div id="savedSetsList">
        <!-- Gespeicherte Sets werden hier angezeigt -->
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
